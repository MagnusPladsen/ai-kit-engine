name = ".NET Enterprise"
description = "Backend rules + all skills"
stacks = ["dotnet", "integrations"]

[rules]
items = ["commit-conventions", "no-auto-push", "plan-refinement", "security", "logging", "database",
         "code-quality", "naming-conventions", "no-phantom-code", "reusable-code",
         "minimal-diff", "design-consistency", "dependency-management",
         "testing-conventions", "pr-conventions",
         "csharp", "clean-architecture", "cqrs-mediatr", "domain-models",
         "persistence-entities", "repository-query-pattern", "error-handling",
         "github", "bitbucket", "azure-devops", "jira"]

[skills]
items = ["commit", "create-pr", "new-issue", "add-migration", "validate-architecture",
         "review", "refactor", "document", "debug", "test", "changelog", "onboard"]

[plugins]
items = ["superpowers", "coderabbit", "context7", "atlassian",
         "commit-commands", "csharp-lsp"]
